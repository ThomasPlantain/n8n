info:
  name: Create speech
  type: http
  seq: 1

http:
  method: POST
  url: http://localhost:8880/v1/audio/speech
  body:
    type: json
    data: |-
      {
        "model": "kokoro",
        "input": "Hello I'm Hal, How can I help you today ?",
        "voice": "af_heart",
        "response_format": "mp3",
        "download_format": "mp3",
        "speed": 1,
        "stream": true,
        "return_download_link": false,
        "lang_code": "a",
        "volume_multiplier": 1,
        "normalization_options": {
          "normalize": true,
          "unit_normalization": false,
          "url_normalization": true,
          "email_normalization": true,
          "optional_pluralization_normalization": true,
          "phone_normalization": true,
          "replace_remaining_symbols": true
        }
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
